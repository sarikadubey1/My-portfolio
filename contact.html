<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact</title>

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("YOUR_PUBLIC_KEY");
    })();
  </script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}

    body{
      background-image:url("image2.jpg");
      color:white;
        background-size:cover;
    }
    .logo {
    font-size: 24px;
    font-weight:bold;
    color: #00ffff;
    letter-spacing: 2px;
    font-family:poppins, sans-serif;
}

    /* Navbar */
    nav{
      display:flex;
      justify-content:space-between;
      padding:15px 40px;
      background:rgba(0,0,0,0.5);
    }

    nav a{
      color:white;
      margin:0 10px;
      text-decoration:none;
    }

    nav a:hover{
      color:#00bcd4;
    }

    /* Contact Section */
    .contact{
      max-width:800px;
      margin:auto;
      padding:40px 20px;
    }

    h1{text-align:center;margin-bottom:10px;}

    .contact p{
      text-align:center;
      margin-bottom:20px;
      color:#ccc;
    }

    .form{
      background:rgba(255,255,255,0.05);
      padding:25px;
      border-radius:10px;
      backdrop-filter: blur(10px);
    }

    input,textarea{
      width:100%;
      padding:12px;
      margin:10px 0;
      border:none;
      border-radius:5px;
      outline:none;
    }

    button{
      width:100%;
      padding:12px;
      background:#00bcd4;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }

    button:hover{
      background:#0097a7;
    }

    .success{
      display:none;
      text-align:center;
      margin-top:10px;
      color:#00ffcc;
    }

    /* Map */
    .map{
      margin-top:30px;
    }

    /* Social */
    .social{
      text-align:center;
      margin-top:20px;
    }

    .social a{
      margin:0 10px;
      color:#00bcd4;
      font-size:20px;
    }

    .social a:hover{
      color:white;
    }

    /* WhatsApp */
    .whatsapp{
      position:fixed;
      bottom:20px;
      right:20px;
      background:#25D366;
      color:white;
      font-size:25px;
      padding:15px;
      border-radius:50%;
      box-shadow:0 5px 15px rgba(0,0,0,0.3);
      z-index:1000;
    }

    .whatsapp:hover{
      transform:scale(1.1);
    }

  .social {
  margin-top: 15px;
  display: flex;
  gap: 15px;
}

/* Social links style */
.social a {
  width: 45px;
  height: 45px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  text-decoration: none;
  background: #1e293b;
  color: white;
  font-size: 18px;
  transition: all 0.3s ease;
}

/* Hover effect */
.social a:hover {
  transform: scale(1.15);
  box-shadow: 0 0 12px rgba(0,0,0,0.4);
}

/* Individual platform colors */
.social a[aria-label="LinkedIn"]:hover {
  background: #0077b5;
}

    
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav>
    <div class="logo">Portfolio.</div>
    <div>
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
    </div>
  </nav>

  <!-- Contact -->
  <section class="contact">
    <h1>Contact Me</h1>
    <p>Feel free to reach out 🚀</p>

    <div class="form">
      <form id="contact-form">
        <input type="text" name="user_name" placeholder="Your Name" required>
        <input type="email" name="user_email" placeholder="Your Email" required>
        <textarea name="message" placeholder="Your Message" required></textarea>
        <button type="submit">Send Message</button>
      </form>

      <div class="success" id="success-msg">
        ✅ Message sent successfully!
      </div>
    </div>

    <!-- Live Map -->
    <div class="map">
      <iframe id="mapFrame"
        width="100%" 
        height="300" 
        style="border:0; border-radius:10px;" 
        loading="lazy">
      </iframe>
    </div>

    <!-- Social -->
    <div class="social">
      <a href="https://www.linkedin.com/in/sarika-dubey-759366357" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://github.com/SarikaDubey" target="_blank"><i class="fab fa-github"></i></a>
      <a href="akashsinghchauhan014@gmail.com"><i class="fas fa-envelope"></i></a>
     <a aria-label="Instagram" href="https://www.instagram.com/miss__bhardwaj90?igsh=NXp5MHl4ZnVhdzky" target="_blank"><i class="fa-brands fa-instagram"></i></a>
   
    </div>
  </section>

  <!-- WhatsApp Button -->
  <a href="https://wa.me/917828423315?text=Hello%20Sarika,%20I%20visited%20your%20portfolio!" 
     class="whatsapp" target="_blank">
    <i class="fab fa-whatsapp"></i>
  </a>

  <!-- JavaScript -->
  <script>

     // 🔑 Initialize EmailJS (PUT YOUR KEY)
    emailjs.init("B6XQlRWedvIkC6bx9");

    // EmailJS
    const form = document.getElementById("contact-form");

    form.addEventListener("submit", function(e){
      e.preventDefault();

      emailjs.sendForm("service_gj587s8","template_r26tvm7",this)
      .then(function(){
        document.getElementById("success-msg").style.display = "block";
        form.reset();
      }, function(){
        alert("Failed to send message ❌");
      });
    });

    // Live Location Map
    function loadMap(lat, lon) {
      document.getElementById("mapFrame").src =
        `https://www.google.com/maps?q=${lat},${lon}&z=15&output=embed`;
    }

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          loadMap(position.coords.latitude, position.coords.longitude);
        },
        function() {
          alert("Please allow location access to show map 📍");
        }
      );
    }
  </script>

</body>
</html>
